name: AccuVerify CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "AccuEntry_Verify/**"
      - ".github/workflows/cicd.yaml"
  workflow_dispatch:

concurrency:
  group: accuverify-${{ github.ref }}
  cancel-in-progress: true

env:
  GCP_REGION: asia-south1
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GAR_REPOSITORY: accuentry
  CLOUD_RUN_SERVICE: accuverify
  IMAGE_NAME: verify
  BACKEND_ACCUENTRY_FASTAPI_URL: ${{ secrets.BACKEND_ACCUENTRY_FASTAPI_URL || 'https://accuentry-api-424990990402.asia-south1.run.app' }}
  FRONTEND_URL: https://virtusa-accu-entry-frontend.vercel.app

jobs:
  build-and-deploy:
    name: Build and deploy AccuVerify
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

      # Required for GHA cache backend support in build-push-action
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push AccuVerify image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          # GitHub Actions cache — scoped to accuverify so it doesn't
          # collide with other services using the same workflow runner cache
          cache-from: type=gha,scope=accuverify
          cache-to: type=gha,scope=accuverify,mode=max
          tags: |
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}:latest

      - name: Deploy AccuVerify to Cloud Run
        run: |
          gcloud run deploy "${CLOUD_RUN_SERVICE}" \
            --image="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/${IMAGE_NAME}:${GITHUB_SHA}" \
            --region="${GCP_REGION}" \
            --project="${GCP_PROJECT_ID}" \
            --platform=managed \
            --ingress=internal-and-cloud-load-balancing \
            --no-allow-unauthenticated \
            --memory=2Gi \
            --cpu=1 \
            --timeout=120 \
            --concurrency=40 \
            --min-instances=0 \
            --max-instances=3 \
            --port=8080 \
            --update-env-vars="MONGO_DB_URL=${{ secrets.MONGO_DB_URL }},REDIS_URL=${{ secrets.REDIS_URL }},VERIFY_SERVICE_API_KEY=${{ secrets.VERIFY_SERVICE_API_KEY }},ADMIN_API_KEY=${{ secrets.ADMIN_API_KEY }},REQUIRE_VERIFY_SERVICE_KEY=true,REQUIRE_ADMIN_KEY=true,BACKEND_ACCUENTRY_FASTAPI_URL=${BACKEND_ACCUENTRY_FASTAPI_URL}"

      - name: Grant AccuEntry runtime SA invoker access on AccuVerify
        run: |
          # Resolve the service account AccuEntry Cloud Run is actually running as
          API_SA="$(gcloud run services describe accuentry-api \
            --region="${GCP_REGION}" \
            --project="${GCP_PROJECT_ID}" \
            --format='value(spec.template.spec.serviceAccountName)')"

          # Fall back to the Compute Engine default SA if none is explicitly set
          if [ -z "${API_SA}" ] || [ "${API_SA}" = "default" ]; then
            PROJECT_NUMBER="$(gcloud projects describe "${GCP_PROJECT_ID}" \
              --format='value(projectNumber)')"
            API_SA="${PROJECT_NUMBER}-compute@developer.gserviceaccount.com"
          fi

          echo "Granting roles/run.invoker to: ${API_SA}"

          gcloud run services add-iam-policy-binding "${CLOUD_RUN_SERVICE}" \
            --region="${GCP_REGION}" \
            --project="${GCP_PROJECT_ID}" \
            --member="serviceAccount:${API_SA}" \
            --role="roles/run.invoker"